name: Build & Package

on:
  push:
    branches: [ "master", "dev" ]
    paths:
      - "digital-banking-backend/**"
      - ".github/workflows/backend-build.yml"
  pull_request:
    branches: [ "master", "dev" ]
    paths:
      - "digital-banking-backend/**"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/digital-banking-backend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test & Build JAR
  # ─────────────────────────────────────────────
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-banking-backend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build JAR (skip tests – already ran above)
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: digital-banking-backend/build/libs/*.jar
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: digital-banking-backend/build/reports/tests/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker image to GHCR
  # ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only publish images on pushes to main/develop (not on PRs)
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name tag  e.g. main, develop
            type=ref,event=branch
            # Short SHA tag    e.g. sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # Semantic version tag (when a vX.Y.Z tag is pushed)
            type=semver,pattern={{version}}
            # "latest" only on master branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./digital-banking-backend
          file: ./digital-banking-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image digest ${{ steps.meta.outputs.tags }}"

